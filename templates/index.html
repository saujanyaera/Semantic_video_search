<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Semantic Video Search</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: #f5f4f0;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 60px 24px;
    }

    .wrap { width: 100%; max-width: 480px; }

    h1 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .sub { font-size: 13px; color: #888; margin-bottom: 36px; }

    .field { margin-bottom: 20px; }

    label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
      font-family: 'IBM Plex Mono', monospace;
    }

    .file-area {
      border: 1px solid #d0cfc9;
      border-radius: 4px;
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      position: relative;
      background: #fff;
      transition: border-color 0.15s;
    }

    .file-area:hover { border-color: #999; }
    .file-area.drag-over { border-color: #1a1a1a; }

    .file-area input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .file-area p { font-size: 13px; color: #999; }

    .file-area .picked {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: #1a1a1a;
      margin-top: 4px;
    }

    video {
      width: 100%;
      border-radius: 3px;
      display: none;
      margin-bottom: 20px;
      background: #000;
    }

    .row { display: flex; gap: 8px; }

    input[type="text"] {
      flex: 1;
      border: 1px solid #d0cfc9;
      border-radius: 4px;
      padding: 9px 12px;
      font-size: 14px;
      font-family: 'IBM Plex Sans', sans-serif;
      background: #fff;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus { border-color: #1a1a1a; }
    input[type="text"]::placeholder { color: #bbb; }

    button.go {
      padding: 9px 18px;
      background: #1a1a1a;
      color: #f5f4f0;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-family: 'IBM Plex Mono', monospace;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }

    button.go:hover { opacity: 0.8; }
    button.go:disabled { opacity: 0.35; cursor: not-allowed; }

    .status {
      margin-top: 16px;
      font-size: 13px;
      font-family: 'IBM Plex Mono', monospace;
      display: none;
      padding: 10px 12px;
      border-radius: 3px;
      line-height: 1.5;
    }

    .status.info    { background: #eeedf0; color: #555; }
    .status.success { background: #eaf4ee; color: #2d6a3f; }
    .status.error   { background: #fdf0f0; color: #b03a2e; }
    .status.show    { display: block; }

    .debug-wrap { margin-top: 20px; }

    .debug-toggle {
      font-size: 11px;
      font-family: 'IBM Plex Mono', monospace;
      color: #bbb;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
    }

    .debug-toggle:hover { color: #888; }

    .debug {
      display: none;
      margin-top: 8px;
      background: #fff;
      border: 1px solid #e0dfd9;
      border-radius: 3px;
      padding: 10px 12px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: #aaa;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 130px;
      overflow-y: auto;
    }

    .debug.show { display: block; }

    .spin {
      display: inline-block;
      width: 10px; height: 10px;
      border: 1.5px solid rgba(245,244,240,0.3);
      border-top-color: #f5f4f0;
      border-radius: 50%;
      animation: sp 0.7s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes sp { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="wrap">

  <h1>video search</h1>
  <p class="sub">find moments using natural language</p>

  <div class="field">
    <label>video file</label>
    <div class="file-area" id="fileDrop">
      <input type="file" id="videoInput" accept="video/*">
      <p>click to browse, or drop a file here</p>
      <div class="picked" id="fileName"></div>
    </div>
  </div>

  <video id="preview" controls></video>

  <div class="field">
    <label>query</label>
    <div class="row">
      <input type="text" id="queryInput" placeholder="e.g. person running, dog barking">
      <button class="go" id="searchBtn">search</button>
    </div>
  </div>

  <div class="status" id="status"></div>

  <div class="debug-wrap">
    <button class="debug-toggle" onclick="toggleDebug()">show log</button>
    <div class="debug" id="debugBox"></div>
  </div>

</div>

<script>
  const videoInput = document.getElementById("videoInput");
  const preview    = document.getElementById("preview");
  const queryInput = document.getElementById("queryInput");
  const searchBtn  = document.getElementById("searchBtn");
  const statusEl   = document.getElementById("status");
  const fileName   = document.getElementById("fileName");
  const debugBox   = document.getElementById("debugBox");
  const fileDrop   = document.getElementById("fileDrop");

  const BACKEND_URL = "http://127.0.0.1:5000/search";
  let debugVisible = false;

  function log(msg) {
    const ts = new Date().toISOString().slice(11, 19);
    debugBox.textContent += `${ts}  ${msg}\n`;
    debugBox.scrollTop = debugBox.scrollHeight;
  }

  function toggleDebug() {
    debugVisible = !debugVisible;
    debugBox.classList.toggle("show", debugVisible);
    document.querySelector(".debug-toggle").textContent =
      debugVisible ? "hide log" : "show log";
  }

  function setStatus(msg, type = "info") {
    statusEl.textContent = msg;
    statusEl.className = `status show ${type}`;
  }

  videoInput.addEventListener("change", function () {
    const file = this.files[0];
    if (!file) return;
    fileName.textContent = file.name;
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
    preview.load();
    setStatus("ready — enter a query and press search", "info");
    log(`loaded: ${file.name} (${(file.size/1024/1024).toFixed(1)} MB)`);
  });

  fileDrop.addEventListener("dragover",  e => { e.preventDefault(); fileDrop.classList.add("drag-over"); });
  fileDrop.addEventListener("dragleave", () => fileDrop.classList.remove("drag-over"));
  fileDrop.addEventListener("drop", e => {
    e.preventDefault();
    fileDrop.classList.remove("drag-over");
    if (e.dataTransfer.files[0]) {
      videoInput.files = e.dataTransfer.files;
      videoInput.dispatchEvent(new Event("change"));
    }
  });

  searchBtn.addEventListener("click", async () => {
    const videoFile = videoInput.files[0];
    const query     = queryInput.value.trim();

    if (!videoFile) { setStatus("upload a video first", "error"); return; }
    if (!query)     { setStatus("enter a search query", "error"); return; }

    searchBtn.disabled = true;
    searchBtn.innerHTML = '<span class="spin"></span>searching';
    setStatus("processing — this may take a moment", "info");
    log(`POST ${BACKEND_URL}`);
    log(`query: "${query}"  file: ${videoFile.name}`);

    const formData = new FormData();
    formData.append("video", videoFile);
    formData.append("query", query);

    try {
      const res = await fetch(BACKEND_URL, { method: "POST", body: formData });
      log(`status: ${res.status}`);

      if (!res.ok) {
        log(`error: ${await res.text()}`);
        setStatus(`server error ${res.status} — check log`, "error");
        return;
      }

      const data = await res.json();
      log(`response: ${JSON.stringify(data)}`);

      if (data.success && data.start_time !== undefined) {
        const t   = parseFloat(data.start_time);
        const end = data.end_time !== undefined ? ` → ${data.end_time}s` : "";
        setStatus(`match at ${t}s${end}`, "success");
        preview.pause();
        preview.currentTime = t;
        setTimeout(() => preview.play(), 200);
      } else {
        setStatus(`no match found. ${data.message || ""}`, "error");
      }

    } catch (err) {
      log(`fetch error: ${err}`);
      setStatus("could not reach backend — is flask running?", "error");
    } finally {
      searchBtn.disabled = false;
      searchBtn.textContent = "search";
    }
  });

  queryInput.addEventListener("keydown", e => {
    if (e.key === "Enter") searchBtn.click();
  });
</script>
</body>
</html>
